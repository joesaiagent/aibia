<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="#0a0a0a"/>

  <!-- Worm body tracing an "a" shape:
       head at top-right with antennae up,
       body curves over the top of the bowl,
       around the left side and bottom,
       back to mid-right (the crossbar),
       then down as the stem to the tail -->
  <path d="M 64,24
           C 64,24 48,16 32,26
           C 16,36 16,58 30,68
           C 44,78 64,72 64,56
           L 64,78"
        fill="none"
        stroke="#4ade80"
        stroke-width="13"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Worm head at top of stem -->
  <circle cx="64" cy="20" r="8" fill="#4ade80"/>

  <!-- Eyes -->
  <circle cx="60" cy="18" r="2" fill="#0a0a0a"/>
  <circle cx="68" cy="18" r="2" fill="#0a0a0a"/>

  <!-- Eye shine -->
  <circle cx="61" cy="17" r="0.8" fill="#fff"/>
  <circle cx="69" cy="17" r="0.8" fill="#fff"/>

  <!-- Antennae pointing up -->
  <line x1="60" y1="13" x2="55" y2="5" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <line x1="68" y1="13" x2="73" y2="5" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <circle cx="54" cy="4" r="2.5" fill="#4ade80"/>
  <circle cx="74" cy="4" r="2.5" fill="#4ade80"/>
</svg>
