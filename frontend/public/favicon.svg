<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#0a0a0a"/>

  <!-- Bold "a" using text -->
  <text x="50" y="82"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="84"
        text-anchor="middle"
        fill="#4ade80">a</text>

  <!-- Worm head at top of the stem (top-right of the "a") -->
  <circle cx="74" cy="21" r="9" fill="#4ade80"/>
  <circle cx="70" cy="18" r="2.2" fill="#0a0a0a"/>
  <circle cx="78" cy="18" r="2.2" fill="#0a0a0a"/>
  <circle cx="71" cy="17" r="0.9" fill="#fff"/>
  <circle cx="79" cy="17" r="0.9" fill="#fff"/>

  <!-- Antennae -->
  <line x1="70" y1="13" x2="64" y2="4" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="13" x2="84" y2="4" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <circle cx="63" cy="3" r="2.5" fill="#4ade80"/>
  <circle cx="85" cy="3" r="2.5" fill="#4ade80"/>
</svg>
