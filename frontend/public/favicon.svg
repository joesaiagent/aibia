<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background pill -->
  <rect width="100" height="100" rx="22" fill="#0a0a0a"/>

  <!-- Worm body in the shape of a lowercase "a" -->
  <!-- The bowl: circular loop -->
  <path d="M 62,38
           C 62,22 50,16 38,20
           C 24,25 18,38 20,52
           C 22,66 34,74 48,72
           C 58,70 64,62 64,54
           L 64,72"
        fill="none"
        stroke="#4ade80"
        stroke-width="13"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Worm head at bottom of stem -->
  <circle cx="64" cy="76" r="8" fill="#4ade80"/>

  <!-- Eyes -->
  <circle cx="60" cy="74" r="2" fill="#0a0a0a"/>
  <circle cx="68" cy="74" r="2" fill="#0a0a0a"/>

  <!-- Eye shine -->
  <circle cx="61" cy="73" r="0.8" fill="#fff"/>
  <circle cx="69" cy="73" r="0.8" fill="#fff"/>

  <!-- Antennae -->
  <line x1="60" y1="68" x2="55" y2="60" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <line x1="68" y1="68" x2="73" y2="60" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
  <circle cx="55" cy="59" r="2.5" fill="#4ade80"/>
  <circle cx="73" cy="59" r="2.5" fill="#4ade80"/>
</svg>
